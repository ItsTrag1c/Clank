<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clank</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header .status {
      font-size: 12px;
      color: var(--text-dim);
    }

    header .status.connected { color: var(--green); }
    header .status.error { color: var(--red); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 16px;
      max-width: 800px;
    }

    .message .role {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-dim);
    }

    .message .role.user { color: var(--accent); }
    .message .role.assistant { color: var(--green); }

    .message .content {
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message .tool-indicator {
      font-size: 12px;
      color: var(--yellow);
      padding: 4px 0;
    }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #input-area textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 200px;
    }

    #input-area textarea:focus {
      border-color: var(--accent);
    }

    #input-area button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 640px) {
      #messages { padding: 12px; }
      #input-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Clank</h1>
    <span id="status" class="status">connecting...</span>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send" disabled>Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    // Extract token from URL fragment
    const token = window.location.hash.slice(1).split('=')[1] || '';

    let ws = null;
    let reqId = 0;
    let currentAssistantEl = null;

    function connect() {
      const port = window.location.port || '18789';
      ws = new WebSocket(`ws://${window.location.hostname}:${port}/ws`);

      ws.onopen = () => {
        // Send connect frame
        ws.send(JSON.stringify({
          type: 'req', id: ++reqId, method: 'connect',
          params: { token, clientName: 'web', protocolVersion: 1 }
        }));
      };

      ws.onmessage = (e) => {
        const frame = JSON.parse(e.data);
        handleFrame(frame);
      };

      ws.onclose = () => {
        statusEl.textContent = 'disconnected';
        statusEl.className = 'status error';
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusEl.textContent = 'connection error';
        statusEl.className = 'status error';
      };
    }

    function handleFrame(frame) {
      if (frame.type === 'hello' || (frame.type === 'res' && frame.ok)) {
        if (frame.type === 'hello' || frame.payload?.sessionKey) {
          statusEl.textContent = 'connected';
          statusEl.className = 'status connected';
          sendBtn.disabled = false;
        }
      }

      if (frame.type === 'event') {
        switch (frame.event) {
          case 'response-start':
            currentAssistantEl = addMessage('assistant', '');
            break;
          case 'token':
            if (currentAssistantEl) {
              currentAssistantEl.querySelector('.content').textContent += frame.payload.content;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            break;
          case 'response-end':
            // Re-render with markdown now that we have the full text
            if (currentAssistantEl) {
              const raw = currentAssistantEl.querySelector('.content').textContent;
              currentAssistantEl.querySelector('.content').innerHTML = renderMarkdown(raw);
            }
            currentAssistantEl = null;
            break;
          case 'tool-start':
            addToolIndicator(`Running: ${frame.payload.name}`);
            break;
          case 'tool-result':
            addToolIndicator(`${frame.payload.success ? 'Done' : 'Error'}: ${frame.payload.name}`);
            break;
        }
      }
    }

    function addMessage(role, text, useMarkdown = false) {
      const div = document.createElement('div');
      div.className = 'message';
      const rendered = useMarkdown ? renderMarkdown(text) : escapeHtml(text);
      div.innerHTML = `<div class="role ${role}">${role}</div><div class="content">${rendered}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addToolIndicator(text) {
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = `<div class="tool-indicator">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /** Basic markdown rendering — code blocks, inline code, bold, italic */
    function renderMarkdown(text) {
      let html = escapeHtml(text);
      // Code blocks: ```lang\ncode\n```
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g,
        '<pre style="background:var(--surface);padding:12px;border-radius:6px;overflow-x:auto;border:1px solid var(--border)"><code>$2</code></pre>');
      // Inline code: `code`
      html = html.replace(/`([^`]+)`/g,
        '<code style="background:var(--surface);padding:2px 6px;border-radius:3px;font-size:0.9em">$1</code>');
      // Bold: **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Italic: *text*
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      ws.send(JSON.stringify({
        type: 'req', id: ++reqId, method: 'sendMessage',
        params: { text }
      }));

      inputEl.value = '';
      inputEl.style.height = 'auto';
    }

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);

    // Connect on load
    connect();
  </script>
</body>
</html>
